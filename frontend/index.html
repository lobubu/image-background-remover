<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Background Remover - 一键去背景</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .drop-zone {
            transition: all 0.3s ease;
        }
        .drop-zone.dragover {
            border-color: #3b82f6;
            background-color: #eff6ff;
            transform: scale(1.02);
        }
        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 768px) {
            .preview-container {
                grid-template-columns: 1fr;
            }
        }
        .checkerboard {
            background-image: 
                linear-gradient(45deg, #e5e5e5 25%, transparent 25%),
                linear-gradient(-45deg, #e5e5e5 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #e5e5e5 75%),
                linear-gradient(-45deg, transparent 75%, #e5e5e5 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100">
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <h1 class="text-2xl font-bold text-gray-800">🖼️ Image Background Remover</h1>
            <p class="text-gray-500 text-sm mt-1">一键去除图片背景，生成透明PNG</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Upload Section -->
        <div id="uploadSection" class="bg-white rounded-2xl shadow-lg p-8 mb-8">
            <div 
                id="dropZone" 
                class="drop-zone border-2 border-dashed border-gray-300 rounded-xl p-12 text-center cursor-pointer hover:border-blue-400 hover:bg-blue-50"
            >
                <div class="text-6xl mb-4">📁</div>
                <h3 class="text-xl font-semibold text-gray-700 mb-2">拖拽图片到这里</h3>
                <p class="text-gray-500 mb-4">或者点击选择文件</p>
                <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" class="hidden">
                <button 
                    id="selectBtn"
                    class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg font-medium transition-colors"
                >
                    选择图片
                </button>
                <p class="text-xs text-gray-400 mt-4">支持 JPG、PNG、WebP，最大 10MB</p>
            </div>
        </div>

        <!-- Processing Section -->
        <div id="processingSection" class="hidden bg-white rounded-2xl shadow-lg p-8 mb-8 text-center">
            <div class="loading-spinner text-6xl mb-4">⚙️</div>
            <h3 class="text-xl font-semibold text-gray-700 mb-2">正在处理中...</h3>
            <p class="text-gray-500">AI 正在为您去除背景，请稍候</p>
            <div class="w-full bg-gray-200 rounded-full h-2 mt-4">
                <div id="progressBar" class="bg-blue-500 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </div>

        <!-- Result Section -->
        <div id="resultSection" class="hidden bg-white rounded-2xl shadow-lg p-8 mb-8">
            <h3 class="text-xl font-semibold text-gray-700 mb-6 text-center">处理完成</h3>
            <div class="preview-container">
                <!-- Original Image -->
                <div class="text-center">
                    <p class="text-sm text-gray-500 mb-2 font-medium">原图</p>
                    <div class="rounded-lg overflow-hidden bg-gray-100 aspect-video flex items-center justify-center">
                        <img id="originalImage" class="max-w-full max-h-full object-contain" alt="原图">
                    </div>
                </div>
                <!-- Processed Image -->
                <div class="text-center">
                    <p class="text-sm text-gray-500 mb-2 font-medium">去背景后</p>
                    <div class="rounded-lg overflow-hidden checkerboard aspect-video flex items-center justify-center">
                        <img id="processedImage" class="max-w-full max-h-full object-contain" alt="处理后">
                    </div>
                </div>
            </div>
            <div class="flex justify-center gap-4 mt-6">
                <button 
                    id="downloadBtn"
                    class="bg-green-500 hover:bg-green-600 text-white px-8 py-3 rounded-lg font-medium transition-colors flex items-center gap-2"
                >
                    <span>💾</span> 下载透明PNG
                </button>
                <button 
                    id="resetBtn"
                    class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-8 py-3 rounded-lg font-medium transition-colors"
                >
                    处理新图片
                </button>
            </div>
        </div>

        <!-- Error Section -->
        <div id="errorSection" class="hidden bg-red-50 border border-red-200 rounded-2xl p-8 mb-8 text-center">
            <div class="text-5xl mb-4">❌</div>
            <h3 class="text-xl font-semibold text-red-700 mb-2">处理失败</h3>
            <p id="errorMessage" class="text-red-600 mb-4"></p>
            <button 
                id="retryBtn"
                class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg font-medium transition-colors"
            >
                重试
            </button>
        </div>

        <!-- Info Section -->
        <div class="bg-white rounded-2xl shadow-lg p-8">
            <h3 class="text-lg font-semibold text-gray-700 mb-4">使用说明</h3>
            <div class="grid md:grid-cols-3 gap-6 text-center">
                <div class="p-4">
                    <div class="text-3xl mb-2">1️⃣</div>
                    <p class="text-gray-600">上传图片</p>
                </div>
                <div class="p-4">
                    <div class="text-3xl mb-2">2️⃣</div>
                    <p class="text-gray-600">AI 自动去除背景</p>
                </div>
                <div class="p-4">
                    <div class="text-3xl mb-2">3️⃣</div>
                    <p class="text-gray-600">下载透明 PNG</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center py-6 text-gray-500 text-sm">
        <p>Powered by Cloudflare Workers + remove.bg API</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
